<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SIGSM - Subir Documento</title>
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>

<body>

    <div class="sidebar">

        <h1 class="logo">SIGSM</h1>

        <ul class="menu">
            <li><a href="../dashboard/index.html">Dashboard</a></li>
            <li><a href="../traslados/index.html">Traslados</a></li>
            <li><a href="../documentos/index.html">Documentos</a></li>
        </ul>

    </div>

    <div class="main">

        <div class="header">

            <div class="header-left">
                <h2>Subir Documento</h2>
            </div>

            <div class="header-right">
                <span class="user">Juan Pérez</span>
                <span class="role">Operador</span>
                <a href="../login.html">
                    <button class="logout">Salir</button>
                </a>
            </div>

        </div>

        <div class="content">

            <h2 class="titulo-seccion">Subir Documento</h2>

            <div class="card card-medium">

                <form class="form">

                    <div class="form-group">
                        <label>Nombre del documento</label>
                        <input type="text" placeholder="Ej: Protocolo COVID">
                    </div>

                    <div class="form-group">
                        <label>Categoría</label>
                        <select>
                            <option value="">Seleccionar</option>
                            <option>Salud</option>
                            <option>Administración</option>
                            <option>Operativo</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Subcategoría</label>
                        <select>
                            <option value="">Seleccionar</option>
                            <option>General</option>
                            <option>Urgencias</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Archivo</label>
                        <input type="file">
                    </div>

                    <button type="button" class="btn-primary btn-big">
                        Subir documento
                    </button>

                </form>

            </div>

        </div>

    </div>

</body>
</html>
